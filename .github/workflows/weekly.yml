name: Weekly Recap

on:
  schedule:
    # Sunday 17:00 UTC = 21:00 Yerevan — one hour after the Sunday 20:00 daily digest.
    - cron: '0 17 * * 0'
  workflow_dispatch: {} # manual "Run workflow" from the Actions tab

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4 # brings the committed history.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Post weekly recap
        run: node src/weekly.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          SITE_URL: ${{ vars.SITE_URL || 'zromek.de' }}
          CHANNEL_HANDLE: ${{ vars.CHANNEL_HANDLE }}
